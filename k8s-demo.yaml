---
apiVersion: v1
kind: Service
metadata:
  name: movies-api-mongo
  namespace: profiling-demo
spec:
  selector:
    app: movies-api-mongo
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: movies-api-mongo
  namespace: profiling-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: movies-api-mongo
  template:
    metadata:
      labels:
        app: movies-api-mongo
        tags.datadoghq.com/env: prod
    spec:
      containers:
        - name: mongo
          image: mongo:5
          imagePullPolicy: Never
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: seed
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: seed
          hostPath:
            path: /seed
---
apiVersion: v1
kind: Service
metadata:
  name: leaky-api-python
  namespace: profiling-demo
spec:
  selector:
    app: leaky-api-python
  ports:
    - port: 9082
      targetPort: 9082
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaky-api-python
  namespace: profiling-demo
  labels:
    tags.datadoghq.com/env: prod
    tags.datadoghq.com/service: leaky-api-python
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaky-api-python
  template:
    metadata:
      labels:
        app: leaky-api-python
        tags.datadoghq.com/env: prod
        tags.datadoghq.com/service: leaky-api-python
        admission.datadoghq.com/enabled: "true"
      annotations:
        ad.datadoghq.com/leaky-api-python.logs: '[{"source":"python","service":"leaky-api-python"}]'
        admission.datadoghq.com/python-lib.version: "latest"
    spec:
      shareProcessNamespace: true
      containers:
        - name: leaky-api-python
          image: dd-continuous-profiler-demo-leaky-api-python:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9082
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: DD_PROFILING_UPLOAD_PERIOD
              value: "60"
            - name: DD_ENV
              value: "prod"
            - name: DD_SERVICE
              value: "leaky-api-python"
            - name: DD_TAGS
              value: "env:prod"
            - name: DD_ENTITY_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: MONGO_URI
              value: "mongodb://movies-api-mongo:27017"
            - name: MOVIES_API_PORT
              value: "9082"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: intro-movies-api-python
  namespace: profiling-demo
spec:
  selector:
    app: intro-movies-api-python
  ports:
    - port: 9085
      targetPort: 9085
---
