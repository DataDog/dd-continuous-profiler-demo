              value: "mongodb://movies-api-mongo:27017"
            - name: MOVIES_API_PORT
              value: "9085"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen-leak-python
  namespace: profiling-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgen-leak-python
  template:
    metadata:
      labels:
        app: loadgen-leak-python
    spec:
      containers:
        - name: loadgen
          image: dd-continuous-profiler-demo-loadgen-leak-python:latest
          imagePullPolicy: Never
          env:
            - name: TARGET_URL
              value: "http://leaky-api-python:9082/movies"
            - name: LOAD_GEN_MODE
              value: "1"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen-intro-python
  namespace: profiling-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgen-intro-python
  template:
    metadata:
      labels:
        app: loadgen-intro-python
    spec:
      containers:
        - name: loadgen
          image: dd-continuous-profiler-demo-loadgen-movies-api-intro-python:latest
          imagePullPolicy: Never
          env:
            - name: TARGET_URL
              value: "http://intro-movies-api-python:9085/credits?q=and"
            - name: LOAD_GEN_MODE
              value: "4"
