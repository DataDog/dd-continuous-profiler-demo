spec:
  replicas: 1
  selector:
    matchLabels:
      app: intro-movies-api-python
  template:
    metadata:
      labels:
        app: intro-movies-api-python
        tags.datadoghq.com/env: prod
        tags.datadoghq.com/service: intro-movies-api-python
        admission.datadoghq.com/enabled: "true"
      annotations:
        ad.datadoghq.com/intro-movies-api-python.logs: '[{"source":"python","service":"intro-movies-api-python"}]'
        admission.datadoghq.com/python-lib.version: "latest"
    spec:
      shareProcessNamespace: true
      containers:
        - name: intro-movies-api-python
          image: dd-continuous-profiler-demo-intro-movies-api-python:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 9085
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_RUNTIME_METRICS_ENABLED
              value: "true"
            - name: DD_PROFILING_ENABLED
              value: "true"
            - name: DD_PROFILING_UPLOAD_PERIOD
              value: "10"
            - name: DD_ENV
              value: "prod"
            - name: DD_SERVICE
              value: "intro-movies-api-python"
